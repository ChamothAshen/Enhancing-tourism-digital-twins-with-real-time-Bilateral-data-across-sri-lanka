<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Model Viewer</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #eeeeee;
      }

      #canvas {
        width: 100%;
        height: 100vh;
        display: block;
      }

      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #333;
        font-family: Arial, sans-serif;
        font-size: 18px;
      }

      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #009688;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      #alert-container {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 1000;
        pointer-events: none;
      }

      .alert-box {
        background-color: rgba(255, 255, 255, 0.95);
        border-left: 6px solid;
        border-radius: 8px;
        padding: 15px 20px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 15px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        transition:
          transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          opacity 0.4s ease;
        opacity: 0;
        transform: translateX(120%);
        backdrop-filter: blur(10px);
        width: 300px;
      }

      .alert-box.visible {
        opacity: 1;
        transform: translateX(0);
      }

      .alert-icon {
        font-size: 28px;
      }

      .alert-content {
        display: flex;
        flex-direction: column;
      }

      .alert-title {
        font-weight: 700;
        font-size: 16px;
        margin-bottom: 4px;
      }

      .alert-message {
        font-size: 13px;
        color: #555;
        line-height: 1.4;
      }

      /* Specific Alert Styles */
      .alert-fog {
        border-left-color: #78909c;
      }

      .alert-fog .alert-title {
        color: #546e7a;
      }

      .alert-slip {
        border-left-color: #ff9800;
      }

      .alert-slip .alert-title {
        color: #f57c00;
      }

      .alert-heat {
        border-left-color: #f44336;
      }

      .alert-heat .alert-title {
        color: #d32f2f;
      }
    </style>
  </head>

  <body>
    <div id="alert-container">
      <div id="alert-fog" class="alert-box alert-fog">
        <div class="alert-icon">🌫️</div>
        <div class="alert-content">
          <span class="alert-title">High Fog Risk</span>
          <span class="alert-message"
            >Visibility may be significantly reduced. Proceed with
            caution.</span
          >
        </div>
      </div>
      <div id="alert-slip" class="alert-box alert-slip">
        <div class="alert-icon">⚠️</div>
        <div class="alert-content">
          <span class="alert-title">High Slip Risk</span>
          <span class="alert-message"
            >Paths may be slippery or wet. Watch your step carefully.</span
          >
        </div>
      </div>
      <div id="alert-heat" class="alert-box alert-heat">
        <div class="alert-icon">🥵</div>
        <div class="alert-content">
          <span class="alert-title">High Heat Stress</span>
          <span class="alert-message"
            >Dangerous heat levels detected. Stay hydrated and seek shade.</span
          >
        </div>
      </div>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      Loading 3D Model...
    </div>
    <canvas id="canvas"></canvas>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xeeeeee);

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById("canvas"),
        antialias: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      // Controls
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 2.0;

      // Load GLB Model
      const loader = new GLTFLoader();
      const loadingDiv = document.getElementById("loading");

      // URL to your GLB model - Replace with your optimized model URL
      // Current: Sample Duck model (small file for testing)
      const modelUrl =
        "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb";

      // Load the model from URL
      loader.load(
        modelUrl,
        function (gltf) {
          const model = gltf.scene;

          // Center and scale the model
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 3 / maxDim;
          model.scale.multiplyScalar(scale);

          model.position.sub(center.multiplyScalar(scale));

          scene.add(model);
          loadingDiv.style.display = "none";
        },
        function (xhr) {
          console.log((xhr.loaded / xhr.total) * 100 + "% loaded");
        },
        function (error) {
          console.error("Error loading model:", error);
          loadingDiv.innerHTML =
            '<div style="color: red;">Error loading 3D model. Check console.</div>';
        },
      );

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // Handle window resize
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ==========================================
      // Risk Alert System (Real API Data)
      // ==========================================

      // TODO: Add your OpenWeatherMap API key here for local testing
      const OPENWEATHER_API_KEY = "YOUR_API_KEY_HERE";
      const SIGIRIYA_LAT = 7.957;
      const SIGIRIYA_LON = 80.76;
      const PREDICT_URL =
        "https://visualizationbackend-production.up.railway.app/predict";

      // Function to update the UI based on risk data
      function updateRiskAlerts(data) {
        console.log("Updating Risk Alerts with data:", data);

        const fogAlert = document.getElementById("alert-fog");
        const slipAlert = document.getElementById("alert-slip");
        const heatAlert = document.getElementById("alert-heat");

        if (data.fog_risk === 1) {
          fogAlert.classList.add("visible");
        } else {
          fogAlert.classList.remove("visible");
        }

        if (data.slip_risk === 1) {
          slipAlert.classList.add("visible");
        } else {
          slipAlert.classList.remove("visible");
        }

        if (data.heat_stress === 1) {
          heatAlert.classList.add("visible");
        } else {
          heatAlert.classList.remove("visible");
        }
      }

      // Fetch real weather data from OpenWeatherMap, then call the predict API
      async function fetchWeatherAndPredict() {
        try {
          // 1. Fetch real weather from OpenWeatherMap
          const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${SIGIRIYA_LAT}&lon=${SIGIRIYA_LON}&appid=${OPENWEATHER_API_KEY}&units=metric`;
          const weatherResp = await fetch(weatherUrl);

          if (!weatherResp.ok) {
            console.error(
              "Failed to fetch weather data. Status:",
              weatherResp.status,
            );
            return;
          }

          const weather = await weatherResp.json();
          console.log("OpenWeatherMap data:", weather);

          // 2. Extract real values
          const temp = weather.main?.temp ?? 0;
          const humidity = weather.main?.humidity ?? 0;
          const windSpeed = weather.wind?.speed ?? 0;
          const rainVolume = weather.rain?.["1h"] ?? 0;
          const cloudPct = weather.clouds?.all ?? 0;
          const hour = new Date().getHours();

          // 3. Build predict payload with real weather data
          // Using OpenWeatherMap values for both API and local fields
          const payload = {
            temp_api: temp,
            hum_api: humidity,
            wind_api: windSpeed,
            rain_api: rainVolume,
            cloud_api: cloudPct,
            temp_local: temp,
            hum_local: humidity,
            wind_local: windSpeed,
            rain_local: rainVolume,
            visitor_count: 50,
            hour: hour,
          };

          console.log("Predict payload:", payload);

          // 4. Call the hosted ML model predict endpoint
          const response = await fetch(PREDICT_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (response.ok) {
            const data = await response.json();
            console.log("Prediction result:", data);
            updateRiskAlerts(data);
          } else {
            console.error(
              "Failed to fetch risk predictions. Status:",
              response.status,
            );
          }
        } catch (error) {
          console.error("Error in fetchWeatherAndPredict:", error);
        }
      }

      // Call once after model starts loading, then poll every 2 minutes
      setTimeout(() => {
        fetchWeatherAndPredict();
        setInterval(fetchWeatherAndPredict, 120000);
      }, 1500);
    </script>
  </body>
</html>
