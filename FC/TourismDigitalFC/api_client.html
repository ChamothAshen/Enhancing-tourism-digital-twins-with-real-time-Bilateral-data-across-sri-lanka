<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigiriya Visitor Forecast API Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        input, textarea, button {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            padding: 12px;
            margin-top: 10px;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .response {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.9em;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
        }

        .response.error {
            background: #fee;
            border-color: #fcc;
            color: #c33;
        }

        .response.success {
            background: #efe;
            border-color: #cfc;
            color: #333;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            line-height: 1.4;
        }

        .chat-message.user {
            background: #e3f2fd;
            text-align: right;
            margin-left: 20px;
        }

        .chat-message.assistant {
            background: #f3e5f5;
            margin-right: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .status {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
        }

        .status.connected {
            background: #efe;
            color: #3a3;
        }

        .status.disconnected {
            background: #fee;
            color: #c33;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .emoji {
            font-size: 1.2em;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            padding: 8px 16px;
            background: #ddd;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            width: auto;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ Sigiriya Visitor Forecast API</h1>
            <p>Real-time visitor count predictions and crowd analysis</p>
        </div>

        <div class="content">
            <!-- Left Column: Tools -->
            <div class="section">
                <div id="status" class="status disconnected">
                    🔴 Checking API connection...
                </div>

                <!-- Check Date -->
                <div class="input-group">
                    <label for="dateInput" class="section-title">📅 Check Specific Date</label>
                    <input type="date" id="dateInput" value="2025-12-25">
                    <button onclick="checkDate()">Get Recommendations</button>
                    <div id="dateResponse" class="response" style="display: none;"></div>
                </div>

                <!-- Best Dates -->
                <div class="input-group">
                    <label class="section-title">✨ Best Dates to Visit</label>
                    <button onclick="getBestDates()">Show Top 10 Best Dates</button>
                    <div id="bestDatesResponse" class="response" style="display: none;"></div>
                </div>

                <!-- Day Patterns -->
                <div class="input-group">
                    <label class="section-title">📊 Day-of-Week Patterns</label>
                    <button onclick="getDayPatterns()">Show Weekly Patterns</button>
                    <div id="patternsResponse" class="response" style="display: none;"></div>
                </div>
            </div>

            <!-- Right Column: Chat -->
            <div class="section">
                <label class="section-title">💬 Chat Interface</label>
                
                <div id="chatMessages" class="chat-box" style="
                    flex: 1;
                    border: 1px solid #ddd;
                    border-radius: 5px;
                    padding: 10px;
                    margin-bottom: 10px;
                    max-height: 400px;
                    overflow-y: auto;
                    background: #fafafa;
                ">
                    <div class="chat-message assistant">
                        <span class="emoji">🤖</span>
                        <strong>Assistant:</strong> Hi! Ask me about visiting Sigiriya. Try "What are the best dates to visit?" or "Is Dec 25 good?"
                    </div>
                </div>

                <div class="input-group" style="margin-top: auto;">
                    <textarea id="chatInput" placeholder="Ask me a question... e.g., 'Is 2025-12-25 good to visit?'" rows="2"></textarea>
                    <button onclick="sendChat()">Send Message</button>
                </div>

                <!-- Chat Examples -->
                <div style="margin-top: 15px; padding: 10px; background: #f9f9f9; border-radius: 5px; font-size: 0.85em;">
                    <p style="margin-bottom: 8px; font-weight: 500;">Try these:</p>
                    <button style="width: 100%; text-align: left; background: white; border: 1px solid #ddd; color: #667eea; margin-bottom: 5px; cursor: pointer;" 
                        onclick="setChatInput('What are the best dates to visit?')">
                        • Best dates to visit
                    </button>
                    <button style="width: 100%; text-align: left; background: white; border: 1px solid #ddd; color: #667eea; margin-bottom: 5px; cursor: pointer;"
                        onclick="setChatInput('Is 2025-12-25 good?')">
                        • Is Dec 25 good?
                    </button>
                    <button style="width: 100%; text-align: left; background: white; border: 1px solid #ddd; color: #667eea; cursor: pointer;"
                        onclick="setChatInput('When is the best time to go?')">
                        • When is best time?
                    </button>
                </div>
            </div>

            <!-- Full Width: Forecast -->
            <div class="section full-width">
                <label class="section-title">📈 90-Day Forecast</label>
                <button onclick="getForecast()">Load Forecast (First 30 days)</button>
                <div id="forecastResponse" class="response" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Check API connection on load
        window.addEventListener('load', () => {
            checkConnection();
        });

        async function checkConnection() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    document.getElementById('status').className = 'status connected';
                    document.getElementById('status').textContent = '🟢 API Connected';
                }
            } catch (error) {
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').textContent = '🔴 API Disconnected - Make sure the server is running';
            }
        }

        async function checkDate() {
            const date = document.getElementById('dateInput').value;
            const responseDiv = document.getElementById('dateResponse');
            
            try {
                responseDiv.innerHTML = '<span class="loading">⏳ Loading...</span>';
                responseDiv.style.display = 'block';

                const response = await fetch(`${API_URL}/recommendations?date=${date}`);
                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    responseDiv.innerHTML = formatJson(data);
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.textContent = data.detail || 'Error loading data';
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function getBestDates() {
            const responseDiv = document.getElementById('bestDatesResponse');
            
            try {
                responseDiv.innerHTML = '<span class="loading">⏳ Loading...</span>';
                responseDiv.style.display = 'block';

                const response = await fetch(`${API_URL}/best-dates`);
                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    let html = '✨ TOP 10 BEST DATES:\n\n';
                    data.forEach((item, i) => {
                        html += `${(i+1).toString().padStart(2)}. ${item.date} (${item.day_of_week})\n    ${item.expected_visitors.toLocaleString()} visitors (${(item.percent_vs_average >= 0 ? '+' : '')}${item.percent_vs_average.toFixed(0)}%)\n`;
                    });
                    responseDiv.innerHTML = html;
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.textContent = 'Error loading best dates';
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function getDayPatterns() {
            const responseDiv = document.getElementById('patternsResponse');
            
            try {
                responseDiv.innerHTML = '<span class="loading">⏳ Loading...</span>';
                responseDiv.style.display = 'block';

                const response = await fetch(`${API_URL}/day-patterns`);
                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    let html = '📊 VISITOR PATTERNS BY DAY:\n\n';
                    data.forEach(item => {
                        html += `${item.day_of_week.padEnd(9)} avg: ${item.average_visitors.toLocaleString().padStart(6)} (${item.min_visitors.toLocaleString()}-${item.max_visitors.toLocaleString()})\n`;
                    });
                    responseDiv.innerHTML = html;
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.textContent = 'Error loading patterns';
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function getForecast() {
            const responseDiv = document.getElementById('forecastResponse');
            
            try {
                responseDiv.innerHTML = '<span class="loading">⏳ Loading...</span>';
                responseDiv.style.display = 'block';

                const response = await fetch(`${API_URL}/forecast?limit=30`);
                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = 'response success';
                    let html = '📈 NEXT 30 DAYS FORECAST:\n\n';
                    html += 'Date         Forecast  Lower  Upper\n';
                    html += '─'.repeat(45) + '\n';
                    data.forEach(item => {
                        html += `${item.date}  ${item.forecast_visitor_count.toString().padStart(6)}   ${item.lower_bound.toString().padStart(6)}   ${item.upper_bound.toString().padStart(6)}\n`;
                    });
                    responseDiv.innerHTML = html;
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.textContent = 'Error loading forecast';
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatInput').value.trim();
            if (!input) return;

            const chatDiv = document.getElementById('chatMessages');
            
            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-message user';
            userMsg.innerHTML = `<span class="emoji">👤</span><strong>You:</strong> ${escapeHtml(input)}`;
            chatDiv.appendChild(userMsg);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            // Clear input
            document.getElementById('chatInput').value = '';

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input })
                });

                const data = await response.json();

                // Add assistant message
                const assistantMsg = document.createElement('div');
                assistantMsg.className = 'chat-message assistant';
                assistantMsg.innerHTML = `<span class="emoji">🤖</span><strong>Assistant:</strong><br>${formatMarkdown(data.assistant_response)}`;
                chatDiv.appendChild(assistantMsg);
                chatDiv.scrollTop = chatDiv.scrollHeight;

            } catch (error) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'chat-message assistant';
                errorMsg.innerHTML = `<span class="emoji">⚠️</span><strong>Error:</strong> ${error.message}`;
                chatDiv.appendChild(errorMsg);
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        }

        function setChatInput(text) {
            document.getElementById('chatInput').value = text;
            document.getElementById('chatInput').focus();
        }

        function formatJson(obj) {
            return JSON.stringify(obj, null, 2);
        }

        function formatMarkdown(text) {
            // Convert markdown to HTML
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter to send chat
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        });
    </script>
</body>
</html>
